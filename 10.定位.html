<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>定位</title>
    <style>
        .box1{
            height: 350px;
            background-color: aqua;
        }

        .box-normal{
            height: 100px;
            width: 100px;
            background-color: blueviolet;
        }

        .box-relative{
            height: 100px;
            width: 100px;
            background-color: bisque;
            position: relative;
            left: 120px; /*距离最左边多少距离*/
            /*right: 20px ;*/  /*距离最右边多少距离*/
            top: 20px;  /*偏离上边距离*/
            /*bottom: 20px ;*/   /*偏离下边距离*/
        }

        .box2{
            background-color: yellow;
            height: 350px;
            margin-bottom: 300px;
        }

        .box-absolute{
            height: 100px;
            width: 100px;
            background-color: blue;
            position: absolute;
            left: 150px;
        }

        .box-fixed{
            width: 100px;
            height: 100px;
            background-color: brown;
            position: fixed;
            right: 0;
            top: 400px;
        }

        .box3{
            width: 500px;
            height: 26px;
            background-color: aquamarine;
            position: fixed;
            top: 0;
            right: 450px;
        }
    </style>
</head>
<body>
    <h1>相对定位</h1>
    <div class="box1">
        <div class="box-normal"></div>
        <div class="box-relative"></div>
        <div class="box-normal"></div>
    </div>

    <h1>固定定位</h1>
    <div class="box2">
        <div class="box-normal"></div>
        <div class="box-absolute"></div>
        <div class="box-normal"></div>
    </div>

    <h1>固定定位</h1>
    <div class="box-fixed"></div>

    <div class="box3">导航栏</div>
</body>
</html>
