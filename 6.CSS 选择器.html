<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS 选择器</title>
</head>
<style>
    /*元素选择器*/
    h2{
        color: aquamarine;
    }
    /*类选择器*/
    .highlig{
        background-color: antiquewhite;
        font-size: 20px;
    }
    /*ID选择器*/
    #header{
        font-size: large;
    }
    /*通用选择器*/
    *{
        font-family: 'kaiti';
        font-weight: bolder;
    }

    /*子元素选择器*/
    .father > .son {
        color: blueviolet;
    }

    /*后代选择器示例*/
    .father p{
        color: blue;
        font-size: larger;
    }

    /*相邻元素选择器*/
    h3 + p {
        background-color: burlywood;
    }

    /*伪类选择器*/
    #element:hover {
        background-color: purple;
    }
    /*
    选中第一个子元素：first-child
    选中第n个子元素：nth-child（）
    连接状态：active
    */

    /*
    伪元素选择器
   创建一个虚拟元素并样式化 ：：after
                            ：：before
    */
</style>
<body>
    <h1>不同类型的css 选择器</h1>

    <h2>这是一个元素选择器示例</h2>
    <h3 class="highlig">这是一个类选择器示例</h3>
    <h3>这是另一个类选择器示例</h3>

    <h4 id="header">这是一个ID选择器示例</h4>

    <div class="father">
        <p class="son">这是一个子元素选择器示例</p>
        <div>
            <p class="grandson">这是一个后代选择器示例</p>
        </div>
    </div>

    <p>这是一个普通的 p 标签</p>
    <h3>这是一个相邻兄弟选择器示例</h3>
    <p>这是另一个 p 标签</p>

    <h3 id="element">这是一个伪类选择器示例</h3>
</body>
</html>
